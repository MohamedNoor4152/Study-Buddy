<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Study Buddy — Peer tutoring for SDSU students</title>
    <script>
      // Restore path from GitHub Pages 404 redirect
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]+)/);
        if (p) {
          window.history.replaceState(null, null, decodeURIComponent(p[1]) + window.location.hash);
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  </head>

    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
